name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate sample data
        run: python generate_sample_data.py

      - name: Train model
        run: |
          cd /home/runner/work/predictive-maintenance/predictive-maintenance
          python -c "
          import sys; sys.path.insert(0, '.')
          from src.data_loader import load_train_data, load_test_data, cap_rul
          from src.features import build_features, get_feature_columns
          import numpy as np, joblib, json, os
          from sklearn.ensemble import RandomForestRegressor
          
          train_df = cap_rul(load_train_data())
          test_df = cap_rul(load_test_data())
          train_f = build_features(train_df)
          test_f = build_features(test_df)
          fc = get_feature_columns(train_f)
          
          rf = RandomForestRegressor(n_estimators=50, max_depth=10, random_state=42, n_jobs=-1)
          rf.fit(train_f[fc].values, train_f['RUL'].values)
          
          os.makedirs('models', exist_ok=True)
          joblib.dump(rf, 'models/best_model.pkl')
          with open('models/feature_columns.json', 'w') as f:
              json.dump(fc, f)
          print('Model trained and saved.')
          "

      - name: Run tests
        run: pytest tests/ -v

      - name: Lint code
        run: |
          pip install flake8
          flake8 src/ api/ --max-line-length=120 --ignore=E501,W503,E402
